# Release workflow — on a pushed v* tag, builds the extension once and ships that
# single artifact to BOTH the VS Code Marketplace and a GitHub Release.
#
# Real release:  push a tag like `v1.2.0` -> builds, verifies the tag matches
#                package.json, runs `vsce publish`, then creates the GitHub Release
#                and attaches the exact `.vsix` that was published.
# Dry run:       trigger manually (workflow_dispatch) -> builds and packages but
#                does NOT publish or create a release, so the runner setup can be
#                tested safely.
#
# Requires a repository secret `VSCE_PAT` (an Azure DevOps Personal Access Token
# with Marketplace > Manage scope for the Steve0verton publisher). The GitHub
# Release uses the built-in GITHUB_TOKEN, which needs `contents: write`.
name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Compile (TypeScript)
        run: npm run compile

      - name: Lint
        run: npm run lint

      # Guard against tagging a version that doesn't match package.json.
      # GITHUB_REF_NAME is a trusted, git-validated ref name; quoted for safety.
      - name: Verify tag matches package.json version
        if: github.event_name == 'push'
        env:
          REF_NAME: ${{ github.ref_name }}
        run: |
          TAG="${REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          echo "tag=$TAG package.json=$PKG"
          if [ "$TAG" != "$PKG" ]; then
            echo "::error::Tag v$TAG does not match package.json version $PKG"
            exit 1
          fi

      # Resolve the version once; the .vsix is named to match the established
      # release-asset convention (brave-search-mcp-<version>.vsix).
      - name: Resolve version
        run: echo "VERSION=$(node -p "require('./package.json').version")" >> "$GITHUB_ENV"

      - name: Package the extension
        run: npx @vscode/vsce package --out "brave-search-mcp-${VERSION}.vsix"

      # Only publishes on a real tag push; a manual dry-run stops after packaging.
      - name: Publish to VS Code Marketplace
        if: github.event_name == 'push'
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: npx @vscode/vsce publish --packagePath "brave-search-mcp-${VERSION}.vsix" --pat "$VSCE_PAT"

      # Cut the GitHub Release from the same artifact, with notes taken straight
      # from this version's CHANGELOG section so the release body never drifts.
      - name: Create GitHub Release
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Extract this version's CHANGELOG section (everything between its own
          # "## [x.y.z]" header and the next "## [" header), drop that header line,
          # and promote the remaining headings one level (### -> ##, #### -> ###)
          # to match the format of past releases.
          awk -v ver="$VERSION" '
            $0 ~ ("^## \\[" ver "\\]") { flag = 1; next }
            flag && /^## \[/ { flag = 0 }
            flag { print }
          ' CHANGELOG.md | sed -E 's/^#(#+)/\1/' > release-notes.md
          gh release create "${GITHUB_REF_NAME}" "brave-search-mcp-${VERSION}.vsix" \
            --title "Release ${GITHUB_REF_NAME} - Brave Search MCP for VS Code" \
            --notes-file release-notes.md
